name: 🌅 Horizon Daily Run

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'Hours of news to fetch'
        required: false
        default: '24'
        type: string
  schedule:
    # 每天早上 7 点（UTC）= 北京时间下午 3 点
    - cron: '0 7 * * *'
  push:
    branches: [main]

jobs:
  horizon:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install Horizon
        run: uv pip install --system -e .

      - name: Configure GitHub
        run: |
          git config --global user.email "bot@jlink.website"
          git config --global user.name "Horizon Bot"

      - name: Run Horizon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run horizon --hours ${{ github.event.inputs.hours || '24' }}

      - name: Deploy to GitHub Pages
        if: github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v4
