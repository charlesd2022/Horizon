name: 🌅 Horizon Daily Run

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'Hours of news to fetch'
        required: false
        default: '24'
        type: string
  schedule:
    # 每天早上 7 点（UTC）= 北京时间下午 3 点
    - cron: '0 7 * * *'
  push:
    branches: [main]

jobs:
  horizon:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install Horizon
        run: uv pip install -e .

      - name: Configure GitHub token
        run: |
          git config --global user.email "bot@jlink.website"
          git config --global user.name "Horizon Bot"

      - name: Run Horizon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run horizon --hours ${{ github.event.inputs.hours || '24' }}

      - name: Deploy to GitHub Pages
        if: github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v4

      - name: Get Pages URL
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "site_url=$(curl -s https://api.github.com/repos/${{ github.repository }}/pages | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("html_url","https://${{ github.repository }}.github.io/Horizon/")')" >> $GITHUB_OUTPUT
          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Comment on workflow run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });
            const pagesUrl = `https://${context.repo.owner}.github.io/Horizon/`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: run.id,
              body: `## 🌅 Horizon 运行完成\n\n**每日简报**: ${pagesUrl}\n\n触发方式: ${{ github.event_name }}\n运行时间: ${new Date().toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'})}`
            });
